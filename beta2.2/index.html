<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./resources/media/favicon.ico">
    <script src="menuInteractionHandler.js" defer></script>
    <script src="settingsCookieHandler.js" defer></script>
    <title>Crashday Hub</title>
</head>
<body>
    
    <!-- Loading Screen -->
    <div class="loading-screen"></div>

    <!-- Vignette Overlay Effect -->
    <div class="vignette"></div>

    <!-- static header -->
    <header>
    </header>

    <!-- Background Video -->
    <div class="background" style="z-index: -99">
        <div class="iframe-container">
            <iframe tabindex="-1" frameborder="0" height="100%" width="100%"
            allow="autoplay; encrypted-media"
            src="https://www.youtube.com/embed/videoseries?list=PLn8rM6JdMMiNrtABEbSfjxSRVmvxKHo7v&autoplay=1&mute=1&loop=1&controls=0&disablekb=1&fs=0&iv_load_policy=3&modestbranding=1&playsinline=1&rel=0&enablejsapi=1">
            </iframe>
            <script src="youtubeIframeAPIHandler.js" defer></script>
        </div>
        <div class="image-background"></div>
    </div>

    <!-- Blinds Overlay Effect -->
    <div class="blinds"></div>

    <!-- Main Menu -->
    <div class="menu-container">
        <nav id="main-menu" class="menu main-menu">
            <ul class="menu-list">
                <li><a href="https://discord.me/crashday" target="_blank" rel="noreferrer noopener"><span data-char="Official Discord">Official Discord</span></a></li>
                <li><a href="https://steamcommunity.com/app/508980/workshop/" target="_blank" rel="noreferrer noopener"><span data-char="Steam Workshop">Steam Workshop</span></a></li>
                <li><a href="#tools-menu"><span data-char="Tools">Tools</span></a></li>
                <li><a href="#resources-menu"><span data-char="Resources">Resources</span></a></li>
                <li><a href="#options-menu"><span data-char="Options">Options</span></a></li>
            </ul>
        </nav>

        <!-- Submenus -->
        <nav id="tools-menu" class="menu submenu">
            <ul class="menu-list">
                <li><a href="https://steamcommunity.com/app/508980/discussions/0/1733213724899660076/" target="_blank" rel="noreferrer noopener"><span data-char="3D Track Editor">3D Track Editor</span></a></li>
                <li><a href="https://github.com/wurunduk/crashday-smart-launcher/releases/latest" target="_blank" rel="noreferrer noopener"><span data-char="Smart Launcher">Smart Launcher</span></a></li>
            </ul>
        </nav>

        <nav id="resources-menu" class="menu submenu">
            <ul class="menu-list">
                <li><a href="https://wurunduk.github.io/crashday-sdk/" target="_blank" rel="noreferrer noopener"><span data-char="Crashday SDK">Crashday SDK</span></a></li>
                <li><a href="https://crashdaycenter.com/" target="_blank" rel="noreferrer noopener"><span data-char="Modding Guides">Modding Guides</span></a></li>
                <li><a href="https://docs.google.com/spreadsheets/d/1-dXl7E2KFRwKLf8ixcD6HMSSu9EfKzN5hGQCQxJ4YOk/edit?usp=sharing" target="_blank" rel="noreferrer noopener"><span data-char="Modding Info">Modding Info</span></a></li>
                <li><a href="https://github.com/wurunduk/blender-p3d-import-export/releases/latest" target="_blank" rel="noreferrer noopener"><span data-char="Blender Plugin">Blender Plugin</span></a></li>
            </ul>
        </nav>

        <nav id="options-menu" class="menu submenu options-menu" aria-label="Audio options">
            <h1 class="options-title">Audio</h1>
            <ul class="menu-list options-list">
                <li class="option-row" data-setting-row="Sound Output"><a href="#" class="setting-link" data-setting="Sound Output" data-setting-type="toggle"></a></li>
                <li class="option-row" data-setting-row="Main Volume"><a href="#" class="setting-link" data-setting="Main Volume" data-setting-type="slider"></a></li>
                <li class="option-row" data-setting-row="Effect Volume"><a href="#" class="setting-link" data-setting="Effect Volume" data-setting-type="slider"></a></li>

                <li class="option-row" data-setting-row="Music"><a href="#" class="setting-link" data-setting="Music" data-setting-type="toggle"></a></li>
                <li class="option-row" data-setting-row="Music Volume"><a href="#" class="setting-link" data-setting="Music Volume" data-setting-type="slider"></a></li>
                <li class="option-row" data-setting-row="Steam Music"><a href="#" class="setting-link" data-setting="Steam Music" data-setting-type="toggle"></a></li>
            </ul>

    <footer>
    </footer>
