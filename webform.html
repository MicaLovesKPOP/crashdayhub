<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Issue</title>
</head>
<body>
    <h1>Submit an Issue</h1>
    <form id="issueForm">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="body">Description:</label>
        <textarea id="body" name="body" required></textarea><br><br>
        <p>Current Time: <span id="time"></span></p>
        <button type="submit">Submit</button>
    </form>

<script>
    // Function to get the current time in hh:mm:ss format
    function getCurrentTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
    }

    // Set the current time in the time span element
    document.getElementById('time').textContent = getCurrentTime();

    document.getElementById('issueForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const title = document.getElementById('title').value;
        const body = document.getElementById('body').value;
        const time = document.getElementById('time').textContent;

        const response = await fetch('https://api.github.com/repos/MicaLovesKPOP/CrashdayBugTracking/actions/workflows/submit-issue.yml/dispatches', {
            method: 'POST',
            headers: {
                'Authorization': 'token YOUR_PERSONAL_ACCESS_TOKEN',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                ref: 'main',
                inputs: {
                    name: name,
                    title: title,
                    body: `**Submitted by:** ${name}\n\n**Time:** ${time}\n\n${body}`
                }
            })
        });

        if (response.ok) {
            alert('Issue submitted successfully!');
        } else {
            alert('Failed to submit issue.');
        }
    });
</script>
</body>
</html>
