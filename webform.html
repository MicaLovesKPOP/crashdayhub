<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Issue</title>
</head>
<body>
    <h1>Submit an Issue</h1>
    <form id="issueForm">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="body">Description:</label>
        <textarea id="body" name="body" required></textarea><br><br>
        <p>Last Updated Time: <span id="lastUpdatedTime"></span></p>
        <button type="submit">Submit</button>
    </form>

<script>
// Function to fetch the last updated time of the file
async function fetchLastUpdatedTime() {
    const response = await fetch('https://api.github.com/repos/MicaLovesKPOP/crashdayhub/commits?path=webform.html');
    const data = await response.json();
    const lastCommit = data[0];
    const lastUpdatedTime = new Date(lastCommit.commit.committer.date).toLocaleTimeString();
    document.getElementById('lastUpdatedTime').textContent = lastUpdatedTime;
}

    // Fetch and display the last updated time when the page loads
    fetchLastUpdatedTime();

    document.getElementById('issueForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const title = document.getElementById('title').value;
        const body = document.getElementById('body').value;
        const time = document.getElementById('lastUpdatedTime').textContent;

        const response = await fetch('https://api.github.com/repos/MicaLovesKPOP/CrashdayBugTracking/actions/workflows/submit-issue.yml/dispatches', {
            method: 'POST',
            headers: {
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                ref: 'main',
                inputs: {
                    name: name,
                    title: title,
                    body: `**Submitted by:** ${name}\n\n**Last Updated Time:** ${time}\n\n${body}`
                }
            })
        });

        if (response.ok) {
            alert('Issue submitted successfully!');
        } else {
            alert('Failed to submit issue.');
        }
    });
</script>
</body>
</html>
