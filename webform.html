<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Issue</title>
</head>
<body>
    <h1>Submit an Issue</h1>
    <form id="issueForm">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="body">Description:</label>
        <textarea id="body" name="body" required></textarea><br><br>
        <button type="submit">Submit</button>
    </form>

<script>
    document.getElementById('issueForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const title = document.getElementById('title').value;
        const body = document.getElementById('body').value;

        const response = await fetch('https://api.github.com/repos/YOUR_USERNAME/YOUR_REPOSITORY/actions/workflows/submit-issue.yml/dispatches', {
            method: 'POST',
            headers: {
                'Authorization': 'token YOUR_PERSONAL_ACCESS_TOKEN',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                ref: 'main',
                inputs: {
                    name: name,
                    title: title,
                    body: body
                }
            })
        });

        if (response.ok) {
            alert('Issue submitted successfully!');
        } else {
            alert('Failed to submit issue.');
        }
    });
</script>
</body>
</html>
