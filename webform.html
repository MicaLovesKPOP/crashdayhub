<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Issue</title>
</head>
<body>
    <p><small><span id="lastUpdatedTime"></span></small></p>
    <h1>Submit an Issue</h1>
    <form id="issueForm">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required>


        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>  


        <label for="body">Description:</label>
        <textarea id="body" name="body" required></textarea> 


        <button type="submit">Submit</button>
    </form>

    <script>
async function fetchLastUpdatedTime() {
  const response = await fetch('https://micaloveskpop.github.io/crashdayhub/webform.html');
  const lastModified = response.headers.get('Last-Modified');
  const lastUpdatedDate = new Date(lastModified);
  const formattedDateTime = lastUpdatedDate.getFullYear().toString().slice(2) +
    String(lastUpdatedDate.getMonth() + 1).padStart(2, '0') +
    String(lastUpdatedDate.getDate()).padStart(2, '0') +
    String(lastUpdatedDate.getHours()).padStart(2, '0') +
    String(lastUpdatedDate.getMinutes()).padStart(2, '0') +
    String(lastUpdatedDate.getSeconds()).padStart(2, '0');
  document.getElementById('lastUpdatedTime').textContent = formattedDateTime;
}

fetchLastUpdatedTime();

document.getElementById('issueForm').addEventListener('submit', async function(event) {
  event.preventDefault();
  const name = document.getElementById('name').value;
  const title = document.getElementById('title').value;
  const body = document.getElementById('body').value;
  const time = document.getElementById('lastUpdatedTime').textContent;

  try {
const response = await fetch('https://api.github.com/repos/MicaLovesKPOP/CrashdayBugTracking/actions/workflows/submit-issue.yml/dispatches', {
  method: 'POST',
  headers: {
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  },
  body: JSON.stringify({
    event_type:'submit-issue',
    client_payload: {
      name: name,
      title: title,
      body: `**Submitted by:** ${name}\n\n**Last Updated Time:** ${time}\n\n${body}`
    }
  })
});

    if (response.ok) {
      alert('Issue submitted successfully!');
    } else {
      alert(`Failed to submit issue: ${response.status} ${response.statusText}`);
    }
  } catch (error) {
    alert(`Error submitting issue: ${error.message}`);
  }
});
    </script>
</body>
</html>
